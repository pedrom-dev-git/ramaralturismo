<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Road/journey element curving behind the monogram -->
  <path d="M2 95 C60 95, 70 55, 120 55 C170 55, 175 75, 220 75" stroke="#0138AD" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <path d="M2 105 C65 105, 80 62, 125 62 C170 62, 180 82, 225 82" stroke="#0138AD" stroke-width="2" stroke-linecap="round" opacity="0.12"/>

  <!-- Shield / badge shape behind monogram -->
  <rect x="18" y="14" width="82" height="92" rx="14" fill="#143E58"/>
  <rect x="23" y="19" width="72" height="82" rx="10" fill="none" stroke="#0138AD" stroke-width="1.5" opacity="0.3"/>

  <!-- Stylized "R" monogram -->
  <text x="37" y="82" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="68" fill="white" letter-spacing="-2">R</text>
  <!-- Decorative accent dot -->
  <circle cx="82" cy="30" r="5" fill="#0138AD"/>

  <!-- Company name -->
  <text x="120" y="55" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="36" fill="#143E58" letter-spacing="1">
    <tspan fill="#143E58">R.</tspan><tspan dx="4" fill="#0138AD">Amaral</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="80" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#666666" letter-spacing="3.5">TURISMO &amp; TRANSPORTE</text>

  <!-- Small bus icon -->
  <g transform="translate(122, 88)" fill="#0138AD" opacity="0.6">
    <rect x="0" y="2" width="22" height="12" rx="3"/>
    <rect x="18" y="5" width="6" height="9" rx="1.5"/>
    <rect x="2" y="4" width="5" height="4" rx="1" fill="white" opacity="0.8"/>
    <rect x="9" y="4" width="5" height="4" rx="1" fill="white" opacity="0.8"/>
    <circle cx="6" cy="16" r="2.5" fill="#143E58"/>
    <circle cx="18" cy="16" r="2.5" fill="#143E58"/>
  </g>

  <!-- Decorative line under tagline -->
  <line x1="155" y1="100" x2="310" y2="100" stroke="#0138AD" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
